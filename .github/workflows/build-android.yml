name: Build Android

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v26.6.27)'
        required: true
        type: string

jobs:
  build:
    name: Build Android
    runs-on: ubuntu-26.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-tags: true

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Build Android Library
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_LATEST_HOME }}
        run: python3 build/main.py android

      - name: Split AAR by architecture
        run: |
          VER=${{ inputs.version }}

          mkdir aar_base
          unzip libXray.aar -d aar_base

          for ABI in arm64-v8a armeabi-v7a x86 x86_64; do
            cp -r aar_base "aar_${ABI}"
            for OTHER in arm64-v8a armeabi-v7a x86 x86_64; do
              [ "$OTHER" != "$ABI" ] && rm -rf "aar_${ABI}/jni/${OTHER}"
            done
            (cd "aar_${ABI}" && zip -r "../libXray-${VER}-${ABI}.aar" .)
          done

          mv libXray-sources.jar "libXray-sources-${VER}.jar"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: libXray-android-${{ inputs.version }}
          path: |
            libXray-*.aar
            libXray-sources*.jar
