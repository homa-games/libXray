name: Build Android

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., 26.6.27)'
        required: true
        type: string

jobs:
  build:
    name: Build Android
    runs-on: ubuntu-26.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-tags: true

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build Android Library
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_LATEST_HOME }}
        run: python3 build/main.py android

      - name: Rename artifacts
        run: |
          VER=${{ inputs.version }}

          mv libXray.aar "libXray-${VER}.aar"
          mv libXray-sources.jar "libXray-sources-${VER}.jar"

      - name: Deploy to Maven repository
        run: |
          VER=${{ inputs.version }}
          mvn deploy:deploy-file \
            -DgroupId=io.github.homa-games \
            -DartifactId=libXray \
            -Dversion=${VER} \
            -Dpackaging=aar \
            -Dfile="libXray-${VER}.aar" \
            -Dsources="libXray-sources-${VER}.jar" \
            -DrepositoryId=repo \
            -Durl="file://$(pwd)/repo" \
            --batch-mode

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add repo/
          git commit -m "Deploy libXray ${{ inputs.version }}"
          git push

      - name: Split AAR by architecture
        run: |
          VER=${{ inputs.version }}

          mkdir aar_base
          unzip libXray-${VER}.aar -d aar_base

          for ABI in arm64-v8a armeabi-v7a x86 x86_64; do
            cp -r aar_base "aar_${ABI}"
            for OTHER in arm64-v8a armeabi-v7a x86 x86_64; do
              [ "$OTHER" != "$ABI" ] && rm -rf "aar_${ABI}/jni/${OTHER}"
            done
            (cd "aar_${ABI}" && zip -r "../libXray-${VER}-${ABI}.aar" .)
          done

      - name: Upload arm64-v8a Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: libXray-android-${{ inputs.version }}-arm64-v8a
          path: |
            libXray-${{ inputs.version }}-arm64-v8a.aar
            libXray-sources-${{ inputs.version }}.jar

      - name: Upload armeabi-v7a Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: libXray-android-${{ inputs.version }}-armeabi-v7a
          path: |
            libXray-${{ inputs.version }}-armeabi-v7a.aar
            libXray-sources-${{ inputs.version }}.jar

      - name: Upload x86 Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: libXray-android-${{ inputs.version }}-x86
          path: |
            libXray-${{ inputs.version }}-x86.aar
            libXray-sources-${{ inputs.version }}.jar

      - name: Upload x86_64 Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: libXray-android-${{ inputs.version }}-x86_64
          path: |
            libXray-${{ inputs.version }}-x86_64.aar
            libXray-sources-${{ inputs.version }}.jar
